<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Get a quote on your phone">
  <!-- background -->
  <rect width="400" height="300" fill="#191C2B"/>
  <circle cx="232" cy="150" r="130" fill="#EFC10C" opacity="0.05"/>

  <!-- phone -->
  <rect x="148" y="50" width="104" height="200" rx="18" fill="#232739" stroke="#FFFFFF" stroke-width="3"/>
  <rect x="160" y="66" width="80" height="168" rx="7" fill="#F5F5F3"/>
  <rect x="185" y="240" width="30" height="4" rx="2" fill="#FFFFFF" opacity="0.5"/>

  <!-- screen: little location header -->
  <circle cx="176" cy="84" r="5" fill="#EFC10C"/>
  <rect x="186" y="81" width="44" height="6" rx="3" fill="#191C2B" opacity="0.85"/>

  <!-- zip from field -->
  <rect x="170" y="100" width="60" height="22" rx="5" fill="#FFFFFF" stroke="#191C2B" stroke-opacity="0.12" stroke-width="1.5"/>
  <rect x="177" y="108" width="20" height="5" rx="2.5" fill="#191C2B" opacity="0.35"/>
  <!-- zip to field -->
  <rect x="170" y="130" width="60" height="22" rx="5" fill="#FFFFFF" stroke="#191C2B" stroke-opacity="0.12" stroke-width="1.5"/>
  <rect x="177" y="138" width="28" height="5" rx="2.5" fill="#191C2B" opacity="0.35"/>

  <!-- get quote button -->
  <rect x="170" y="166" width="60" height="26" rx="6" fill="#EFC10C"/>
  <rect x="183" y="176" width="34" height="6" rx="3" fill="#191C2B"/>

  <!-- 60 seconds tag -->
  <g transform="translate(78,150)">
    <rect x="0" y="0" width="78" height="34" rx="17" fill="#232739" stroke="#FFFFFF" stroke-width="2"/>
    <circle cx="19" cy="17" r="9" fill="none" stroke="#EFC10C" stroke-width="2.5"/>
    <path d="M19 12 V17 L23 19.5" fill="none" stroke="#EFC10C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="34" y="10" width="34" height="5" rx="2.5" fill="#FFFFFF"/>
    <rect x="34" y="20" width="22" height="5" rx="2.5" fill="#FFFFFF" opacity="0.55"/>
  </g>

  <!-- sparkle -->
  <path d="M300 66 L304.5 81.5 L320 86 L304.5 90.5 L300 106 L295.5 90.5 L280 86 L295.5 81.5 Z" fill="#EFC10C"/>
</svg>
