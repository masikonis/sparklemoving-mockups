<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="See your price breakdown">
  <!-- background -->
  <rect width="400" height="300" fill="#191C2B"/>
  <circle cx="200" cy="150" r="135" fill="#EFC10C" opacity="0.05"/>

  <!-- price breakdown card -->
  <rect x="104" y="48" width="192" height="204" rx="14" fill="#F5F5F3"/>
  <rect x="104" y="48" width="192" height="204" rx="14" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- card heading -->
  <rect x="124" y="72" width="86" height="9" rx="4.5" fill="#191C2B"/>
  <rect x="124" y="88" width="54" height="6" rx="3" fill="#191C2B" opacity="0.35"/>

  <!-- line item: crew -->
  <rect x="124" y="116" width="58" height="6" rx="3" fill="#191C2B" opacity="0.4"/>
  <rect x="232" y="116" width="40" height="6" rx="3" fill="#191C2B" opacity="0.8"/>
  <!-- line item: hours -->
  <rect x="124" y="138" width="48" height="6" rx="3" fill="#191C2B" opacity="0.4"/>
  <rect x="242" y="138" width="30" height="6" rx="3" fill="#191C2B" opacity="0.8"/>
  <!-- line item: travel -->
  <rect x="124" y="160" width="64" height="6" rx="3" fill="#191C2B" opacity="0.4"/>
  <rect x="238" y="160" width="34" height="6" rx="3" fill="#191C2B" opacity="0.8"/>

  <!-- divider -->
  <line x1="124" y1="186" x2="272" y2="186" stroke="#191C2B" stroke-opacity="0.14" stroke-width="2"/>

  <!-- total row -->
  <rect x="124" y="206" width="44" height="9" rx="4.5" fill="#191C2B"/>
  <text x="272" y="217" text-anchor="end" font-family="Outfit, Arial, sans-serif" font-size="26" font-weight="700" fill="#191C2B">$1,240</text>
  <rect x="190" y="223" width="82" height="14" rx="7" fill="#EFC10C" opacity="0"/>

  <!-- sparkle -->
  <path d="M286 60 L290 73 L303 77 L290 81 L286 94 L282 81 L269 77 L282 73 Z" fill="#EFC10C"/>
</svg>
