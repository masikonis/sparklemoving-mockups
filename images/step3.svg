<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sparkle crew moving day">
  <!-- background -->
  <rect width="400" height="300" fill="#191C2B"/>
  <circle cx="210" cy="150" r="135" fill="#EFC10C" opacity="0.05"/>

  <!-- motion lines -->
  <line x1="40" y1="150" x2="86" y2="150" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="34" y1="172" x2="74" y2="172" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="44" y1="194" x2="80" y2="194" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3.5" stroke-linecap="round"/>

  <!-- ground -->
  <line x1="60" y1="232" x2="372" y2="232" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3" stroke-linecap="round"/>

  <!-- cargo box -->
  <rect x="100" y="116" width="150" height="96" rx="8" fill="#232739" stroke="#FFFFFF" stroke-width="3.5"/>

  <!-- sparkle panel on the side -->
  <rect x="118" y="134" width="60" height="60" rx="8" fill="none" stroke="#EFC10C" stroke-width="2.5" opacity="0.55"/>
  <path d="M148 142 L153 158 L169 163 L153 168 L148 184 L143 168 L127 163 L143 158 Z" fill="#EFC10C"/>

  <!-- cab -->
  <path d="M250 212 V140 H286 L312 168 V212 Z" fill="#232739" stroke="#FFFFFF" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- windshield -->
  <path d="M286 148 L304 168 H286 Z" fill="#EFC10C" opacity="0.85"/>

  <!-- wheels -->
  <circle cx="150" cy="212" r="20" fill="#191C2B" stroke="#FFFFFF" stroke-width="3.5"/>
  <circle cx="150" cy="212" r="8" fill="#EFC10C"/>
  <circle cx="278" cy="212" r="20" fill="#191C2B" stroke="#FFFFFF" stroke-width="3.5"/>
  <circle cx="278" cy="212" r="8" fill="#EFC10C"/>

  <!-- sparkle accent -->
  <path d="M330 96 L334 109 L347 113 L334 117 L330 130 L326 117 L313 113 L326 109 Z" fill="#EFC10C"/>
</svg>
